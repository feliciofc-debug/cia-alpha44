# Blueprint Render — CIA / Alpha 44
# Conectar no dashboard: New > Blueprint > repo GitHub
# Docs: docs/ECOSYSTEM.md

databases:
  - name: cia-alpha44-db
    databaseName: cia_alpha44
    user: cia_app
    plan: basic-256mb
    region: oregon
    ipAllowList: []

services:
  - type: web
    name: cia-alpha44-api
    runtime: node
    region: oregon
    plan: starter
    rootDir: .
    buildCommand: npm ci && npm run build:api
    preDeployCommand: npm run db:migrate:deploy -w @cia/db
    startCommand: npm run start:api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: LLM_PROVIDER
        value: anthropic
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: DATABASE_URL
        fromDatabase:
          name: cia-alpha44-db
          property: connectionString
      # Defina no painel Render (sync: false = não sobrescreve no redeploy):
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WEB_ORIGIN
        sync: false
